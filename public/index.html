<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>lgboard</title>
<script>
  // Anti-flash: apply theme/mode/density to <html> before first paint.
  (function () {
    try {
      var p = JSON.parse(localStorage.getItem('lgboard.prefs') || 'null') || {};
      var r = document.documentElement;
      r.dataset.theme   = p.theme   || 'ink';
      r.dataset.mode    = p.mode    || 'dark';
      r.dataset.density = p.density || 'comfortable';
    } catch (e) {
      document.documentElement.dataset.mode = 'dark';
    }
  })();
</script>
<link id="lg-fonts" rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="lg-fonts-css" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="root"></div>

<script src="vendor/react.production.min.js"></script>
<script src="vendor/react-dom.production.min.js"></script>
<script src="vendor/babel.min.js"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel">
  const clientPrefs = JSON.parse(localStorage.getItem('lgboard.prefs') || 'null') || {};
  ReactDOM.createRoot(document.getElementById('root'))
    .render(<Dashboard clientPrefs={clientPrefs} />);
</script>
</body>
</html>
